# Hidden, host-only. Never mounted into the UEA container.
entries:
  - id: nucleotide_binding_titration_curves
    description: >-
      Experimental nucleotide-binding titration curves for bacterial F1-ATPase,
      including ATP-only, ADP-only, mixed-nucleotide, and combined assay tables.
      These measurements can constrain quantitative models of catalytic-state
      occupancy and nucleotide dependence.
    kind: raw
    grantable: true
    source_base: problem
    modalities: [csv, binding, kinetics]
    source_paths:
      - repo/BayesianTraining/input_data/F1-ATPase_complete.bind.csv
      - repo/BayesianTraining/input_data/F1-ATPase_both.bind.csv
      - repo/BayesianTraining/input_data/F1-ATPase_onlyMix.bind.csv
      - repo/BayesianTraining/input_data/F1-ATPase_onlyPure.bind.csv
      - repo/MarkovModelPrediction/PlotScripts/include/ExpDataLib/F1-ATPase_ATP.bind.csv
      - repo/MarkovModelPrediction/PlotScripts/include/ExpDataLib/F1-ATPase_ADP.bind.csv
      - repo/MarkovModelPrediction/PlotScripts/include/ExpDataLib/F1-ATPase_mix.bind.csv

  - id: published_literature_constraints
    description: >-
      Quantitative constraints not present in the local tables, such as rotary
      step structure, single-molecule rotation statistics, ATPase turnover
      rates, and literature-reported hydrolysis kinetics, may be drawn from
      public single-molecule and biochemistry literature.
    kind: online
    grantable: true
    modalities: [literature]
    online: null

