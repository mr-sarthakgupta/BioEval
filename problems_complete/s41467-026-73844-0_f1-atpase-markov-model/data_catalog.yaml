problem_id: s41467-026-73844-0_f1-atpase-markov-model
# Hidden, host-only. Never mounted into the UEA container.
entries:
  - id: nucleotide_binding_titration_curves
    description: >-
      Neutral combined export of predecessor ATP-only, ADP-only, and mixed-nucleotide
      binding titration observations for bacterial F1-ATPase.
    kind: raw
    grantable: true
    source_base: problem
    modalities: [csv, binding, kinetics]
    source_paths:
      - curated/nucleotide_binding_titrations.csv

  - id: turnover_and_coupling_training_observations
    description: >-
      Neutral table of ATP-dependent turnover-rate and chemo-mechanical coupling
      observations with the uncertainty scales used for calibration. Values originate
      in predecessor experiments and contain no fitted parameters or author predictions.
    kind: raw
    grantable: true
    source_base: problem
    modalities: [csv, kinetics, rotation]
    source_paths:
      - curated/training_observations.csv

  - id: independent_mechanistic_validation_constraints
    description: >-
      Curated predecessor evidence reserved for validation: ATP-dependent dwell
      population direction, catalytic-step orientations, saturating bound ADP:ATP
      ratio, and structural and affinity asymmetry. The table records observations
      and tolerances, not model rankings or fitted predictions.
    kind: raw
    grantable: true
    source_base: problem
    modalities: [csv, rotation, kinetics, structure, validation]
    source_paths:
      - curated/independent_validation_constraints.csv

  - id: fixed_model_selection_protocol
    description: Numeric fit, validation, and BIC thresholds applied equally to three- and four-conformation model classes.
    kind: processed
    grantable: true
    source_base: problem
    modalities: [csv, evaluation-protocol]
    source_paths: [curated/model_selection_protocol.csv]

  # ---- explicitly blocked (leak vectors) ----
  - id: author_repo_archive
    description: Deposited code archive for this study.
    kind: processed
    grantable: false
    reason: The archive is the authors' model implementation and is the solution.
    source_paths:
      - zenodo/19133448/**/*.zip

  - id: record_metadata
    description: Repository record metadata.
    kind: processed
    grantable: false
    reason: Record metadata exposes the paper title, authors, and DOI.
    source_paths:
      - zenodo/19133448/metadata.json

  - id: target_paper_source_data_archive
    description: Nature Source Data archive for the target paper.
    kind: processed
    grantable: false
    reason: >-
      The archive is dominated by fitted parameter ensembles, model predictions,
      state populations, model rankings, and figure-organized outputs that encode
      the target conclusions.
    source_base: problem
    source_paths:
      - data/nature-supplementary/source-data.zip

  - id: target_paper_supplementary_information
    description: Supplementary Information PDF for the target paper.
    kind: processed
    grantable: false
    reason: >-
      The document states the target model-selection results, candidate pruning,
      and mechanistic conclusions.
    source_base: problem
    source_paths:
      - data/nature-supplementary/supplementary-information.pdf
