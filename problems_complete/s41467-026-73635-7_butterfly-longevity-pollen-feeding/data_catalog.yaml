problem_id: s41467-026-73635-7_butterfly-longevity-pollen-feeding
# Hidden, host-only. Never mounted into the UEA container.
# source_paths are globs relative to this problem's data/ directory.
entries:
  - id: neutral_observation_tables
    description: >-
      Neutral CSV exports of individual survival, diet, physiology, and
      mark-recapture observations plus species maximum-lifespan records.
    kind: processed
    grantable: true
    source_base: problem
    modalities: [csv, survival, diet, physiology, capture-recapture]
    source_paths: [curated/observations/*.csv]

  - id: species_max_lifespan_records
    description: >-
      Per-species maximum adult lifespan records for heliconiine butterflies,
      including feeding habit labels (R .rds tables).
    kind: raw
    grantable: true
    modalities: [rds, survival]
    source_paths:
      - figshare/31081597/lifespan_data.rds
      - figshare/31081597/table_1_data.rds

  - id: hecale_dryas_diet_survival
    description: >-
      Individual adult survival and weight records for a controlled captive
      diet experiment comparing H. hecale and Dryas iulia under pollen-fed and
      pollen-deprived treatments (R .rds table).
    kind: raw
    grantable: true
    modalities: [rds, survival, diet]
    source_paths:
      - figshare/31081597/longsurv.rds

  - id: five_species_lab_survival
    description: >-
      Individual captive adult survival records for Agraulis vanillae,
      Dryadula phaetusa, Dryas iulia, H. hecale, and H. melpomene
      (R .rds table).
    kind: raw
    grantable: true
    modalities: [rds, survival]
    source_paths:
      - figshare/31081597/totalcogsurv.RDS

  - id: markrecapture_sightings
    description: >-
      Field mark-recapture sighting histories and per-individual identification
      records across species, usable to estimate wild survival/recapture rates.
    kind: raw
    grantable: true
    modalities: [rds, capture-recapture]
    source_paths:
      - figshare/31081597/sightings*.rds
      - figshare/31081597/IDdata*.rds

  - id: locomotor_activity_with_age
    description: >-
      Combined age-resolved locomotor activity measurements for H. hecale and
      Dryas iulia butterflies by treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, locomotor]
    source_paths:
      - figshare/31081597/locomotordata.rds

  - id: locomotor_activity_hecale
    description: >-
      Age-resolved locomotor activity measurements for H. hecale butterflies
      by treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, locomotor]
    source_paths:
      - figshare/31081597/locomotordata_H.rds

  - id: locomotor_activity_dryas
    description: >-
      Age-resolved locomotor activity measurements for Dryas iulia butterflies
      by treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, locomotor]
    source_paths:
      - figshare/31081597/locomotordata_D.rds

  - id: gut_score_with_age
    description: >-
      Combined age-resolved gut score measurements for H. hecale and Dryas
      iulia butterflies by treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, gut-score]
    source_paths:
      - figshare/31081597/fullGSdata.rds

  - id: gut_score_hecale
    description: >-
      Age-resolved gut score measurements for H. hecale butterflies by
      treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, gut-score]
    source_paths:
      - figshare/31081597/fullGSdata_H.rds

  - id: gut_score_dryas
    description: >-
      Age-resolved gut score measurements for Dryas iulia butterflies by
      treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, gut-score]
    source_paths:
      - figshare/31081597/fullGSdata_D.rds

  - id: body_weight_with_age
    description: >-
      Combined age-resolved body-weight measurements for H. hecale and Dryas
      iulia butterflies by treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, weight]
    source_paths:
      - figshare/31081597/fullweightdata2.rds

  - id: body_weight_hecale
    description: >-
      Normalized age-resolved body-weight measurements for H. hecale butterflies
      by treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, weight]
    source_paths:
      - figshare/31081597/hecaleweightdata_norm.rds

  - id: body_weight_dryas
    description: >-
      Normalized age-resolved body-weight measurements for Dryas iulia
      butterflies by treatment (R .rds object).
    kind: raw
    grantable: true
    modalities: [rds, physiology, weight]
    source_paths:
      - figshare/31081597/dryasweightdata_norm.rds

  - id: supplementary_tables
    description: >-
      Supplementary tabular datasets and sample metadata: per-individual and
      per-species measurements behind the study's analyses (CSV/XLSX).
    kind: processed
    grantable: false
    reason: The monolithic workbook and supplementary tables broaden the grant surface beyond the scoped observation bundle.
    modalities: [csv, xlsx, metadata]
    source_paths:
      - figshare/31081597/Supplementary_Data_*.csv
      - figshare/31081597/metadata.csv
      - nature-supplementary/supplementary-data.xlsx

  - id: phylogeny_tree
    description: >-
      Time-calibrated phylogenetic tree of the relevant butterfly tribe
      (FigTree/Newick), usable for lineage-aware comparative analyses.
    kind: raw
    grantable: true
    modalities: [newick, phylogeny]
    source_paths:
      - figshare/31081597/MCMCtree*.tree

  - id: public_figshare_record
    description: >-
      The public deposited dataset for this study (raw measurement files only;
      author analysis scripts and dataset README are excluded).
    kind: processed
    grantable: false
    reason: The target deposit mixes observations with author scripts and fitted outputs; curated local observations replace it.
    modalities: [csv, rds]
    online:
      provider: figshare
      article_id: 31081597
      include: ["*.csv", "*.rds", "*.RDS", "*.tree"]
      exclude: ["*.R", "README*", "metadata.json", "basta_summary.rds", "pred.new_*.rds"]

  # ---- explicitly blocked (leak vectors) ----
  - id: author_analysis_code
    description: Author analysis scripts.
    kind: processed
    grantable: false
    reason: R analysis scripts encode the study's methods and conclusions.
    source_paths:
      - figshare/31081597/*.R

  - id: processed_analysis_outputs
    description: Fitted survival summaries and model-predicted physiology trajectories.
    kind: processed
    grantable: false
    reason: Precomputed summaries and prediction objects encode the study's analyses.
    source_paths:
      - figshare/31081597/basta_summary.rds
      - figshare/31081597/pred.new_*.rds

  - id: dataset_readme
    description: Figshare dataset README.
    kind: processed
    grantable: false
    reason: The dataset README references the source publication and its findings.
    source_paths:
      - figshare/31081597/README.txt

  - id: record_metadata
    description: Repository record metadata.
    kind: processed
    grantable: false
    reason: Record metadata exposes the paper title, authors, and DOI.
    source_paths:
      - figshare/31081597/metadata.json

  - id: figure_source_data
    description: Packaged per-figure source data.
    kind: processed
    grantable: false
    reason: Figure source data directly encodes the published results.
    source_paths:
      - nature-supplementary/source-data.zip
