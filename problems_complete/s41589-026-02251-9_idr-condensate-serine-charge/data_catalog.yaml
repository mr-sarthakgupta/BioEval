problem_id: s41589-026-02251-9_idr-condensate-serine-charge
# Hidden, host-only. Never mounted into the UEA container.
entries:
  - id: idr_miscibility_assay_tables
    description: >-
      Neutral CSV exports of only the experimental miscibility, composition, and
      perturbation observation sheets. Figure statistics, fitted thresholds, ROC
      analyses, model summaries, and other answer-bearing sheets are excluded.
    kind: processed
    grantable: true
    source_base: problem
    modalities: [csv, tabular, miscibility, sequence-composition, perturbation]
    source_paths:
      - curated/observations/*.csv

  - id: perturbation_training_labels
    description: >-
      Pair-grouped perturbation observations reserved for model development; all
      replicates for a given assay and IDR pair remain on one side of the split.
    kind: processed
    grantable: true
    source_base: problem
    modalities: [csv, perturbation, training]
    source_paths: [curated/perturbation_training.csv]

  - id: perturbation_test_rows
    description: Prediction template for held-out IDR pairs, without Pearson-r outcomes.
    kind: processed
    grantable: true
    source_base: problem
    modalities: [csv, perturbation, prediction-template]
    source_paths: [curated/perturbation_test_rows.csv]

  - id: public_zenodo_record
    description: >-
      Public deposited data tables for IDR miscibility and sequence-composition
      measurements; simulation result archives, code archives, and documents are
      excluded.
    kind: processed
    grantable: false
    reason: The target deposit bundles answer-bearing workbooks and author outputs.
    modalities: [xlsx, miscibility, sequence-composition]
    online:
      provider: zenodo
      record_id: 19565235
      include: ["*.xlsx"]
      exclude: ["*.pdf", "*.rar", "*.zip", "metadata.json"]

  - id: public_condensate_datasets
    description: >-
      Related public resources on intrinsically disordered region sequences and
      biomolecular condensate behavior, available on the open web.
    kind: online
    grantable: false
    reason: This placeholder has no pinned provider, accession, version, or file allowlist.
    modalities: [csv, fasta]
    online: null

  # ---- explicitly blocked (leak vectors) ----
  - id: perturbation_holdout_labels
    description: Evaluator-only outcomes for pair-grouped perturbation tests.
    kind: processed
    grantable: false
    reason: These outcomes are used only for hidden metric recomputation.
    source_base: problem
    source_paths:
      - evaluator/perturbation_test_labels.csv
      - evaluator/holdout_source/*.csv

  - id: complete_source_workbooks
    description: Original multi-sheet supplementary workbooks.
    kind: processed
    grantable: false
    reason: >-
      The workbooks co-package raw observations with fitted statistics, thresholds,
      ROC/AUC analyses, model summaries, and figure-organized result sheets.
    source_paths:
      - nature-supplementary/*.xlsx

  - id: supplementary_information_pdf
    description: Supplementary information documents.
    kind: processed
    grantable: false
    reason: The supplementary-information PDFs contain the paper text and findings.
    source_paths:
      - nature-supplementary/*.pdf

  - id: author_repo_archive
    description: Deposited code archive for this study.
    kind: processed
    grantable: false
    reason: The archive is the authors' analysis code and is the solution.
    source_paths:
      - zenodo/19565235/**/*.zip

  - id: simulation_results_archive
    description: Simulation input and results archive.
    kind: processed
    grantable: false
    reason: The archive bundles simulation results that encode the study's findings.
    source_paths:
      - zenodo/19565235/*.rar

  - id: record_metadata
    description: Repository record metadata.
    kind: processed
    grantable: false
    reason: Record metadata exposes the paper title, authors, and DOI.
    source_paths:
      - zenodo/19565235/metadata.json
