problem_id: s41467-026-73977-2_forge-cancer-drug-response
# Hidden, host-only. Never mounted into the UEA container.
entries:
  - id: gene_dependency_matrix
    description: >-
      Genome-wide gene-dependency (loss-of-function/CRISPR) scores across many
      cancer cell lines. Large file (~360 MB).
    kind: raw
    grantable: true
    modalities: [csv, dependency]
    approx_bytes: 358187867
    source_paths:
      - figshare/31268542/Dep.csv

  - id: basal_expression_matrix
    description: >-
      Baseline gene-expression profiles across the same cancer cell lines.
      Large file (~325 MB).
    kind: raw
    grantable: true
    modalities: [csv, expression]
    approx_bytes: 325222227
    source_paths:
      - figshare/31268542/Exp.csv

  - id: drug_response_training_labels
    description: >-
      Drug sensitivity (IC50) measurements for fixed training cell lines only.
      Duplicate source columns are collapsed by their arithmetic mean.
    kind: processed
    grantable: true
    modalities: [csv, drug-response]
    source_base: problem
    source_paths:
      - curated/drug_response_train.csv

  - id: drug_response_test_rows
    description: >-
      Drug and cell-line keys defining the fixed held-out prediction rows. Outcome
      labels are retained by the evaluator and are not present in this table.
    kind: processed
    grantable: true
    modalities: [csv, drug-response, prediction-template]
    source_base: problem
    source_paths:
      - curated/drug_response_test_rows.csv

  - id: drug_target_map
    description: >-
      Drug-to-target gene mapping needed to align each drug-response measurement
      with the corresponding gene-dependency feature. This is an input mapping, not
      a fitted model or analysis result.
    kind: raw
    grantable: true
    source_base: problem
    modalities: [csv, drug-target]
    source_paths:
      - curated/drug_target_map.csv

  - id: fixed_cell_line_split
    description: >-
      Deterministic train/test assignment for the 700 cell lines shared by the
      dependency, expression, and IC50 matrices. The split is generated by SHA-256
      hashing "bioeval-forge-v1:" plus the cell-line identifier modulo five; bucket
      zero is test and the other buckets are train.
    kind: derivable
    grantable: true
    source_base: problem
    modalities: [csv, split]
    source_paths:
      - curated/cell_line_split.csv

  - id: pancancer_expression_perturbation
    description: >-
      Large pan-cancer expression dataset used for external evaluation (~334 MB).
    kind: raw
    grantable: true
    modalities: [csv, expression]
    approx_bytes: 333976796
    source_paths:
      - figshare/31268542/Tahoe_voom_exp_final.csv

  - id: pdx_expression
    description: >-
      Patient-derived xenograft expression profiles (normalised) for external
      validation.
    kind: raw
    grantable: true
    modalities: [csv, expression]
    source_paths:
      - figshare/31268542/pdx_subset_voom_normalised.csv

  - id: pathway_feature_dataset
    description: >-
      Precomputed per-sample pathway-enrichment feature table that can be used as
      model input features.
    kind: processed
    grantable: false
    reason: Precomputed feature tables encode part of the study's modeling pipeline.
    modalities: [parquet, features]
    source_paths:
      - figshare/31268542/precily_pes_dataset.parquet

  - id: depmap_pointer
    description: >-
      Pointer/README for the public DepMap portal (gene dependency + expression).
    kind: raw
    grantable: false
    reason: Pointer files reveal source/provenance rather than providing measurements.
    modalities: [readme]
    source_paths:
      - external/depmap/README.md

  - id: public_figshare_record
    description: >-
      Public deposited input matrices for gene dependency and expression;
      drug-response labels, trained models, and precomputed analysis outputs are excluded.
    kind: processed
    grantable: false
    reason: The target deposit contains alternate copies of evaluator-held response labels.
    modalities: [csv]
    online:
      provider: figshare
      article_id: 31268542
      include: ["*.csv"]
      exclude:
        - "Creammist_common_ic50.csv"
        - "*FORGE.pkl"
        - "*.hdf5"
        - "*.parquet"
        - "precily_pes_dataset.parquet"
        - "*geneImp.csv"
        - "*keyCluster_deg.csv"
        - "*steinerTree.graphml"
        - "*_results.csv"
        - "*DEG_list*"
        - "metadata.json"

  - id: public_depmap_gdsc
    description: >-
      Related public resources for cancer dependency and drug response (e.g. the
      DepMap portal and large drug-sensitivity panels), available on the open web.
    kind: online
    grantable: false
    reason: This unpinned placeholder could retrieve alternate copies of held-out IC50 labels.
    modalities: [csv]
    online: null

  # ---- explicitly blocked (leak vectors) ----
  - id: full_drug_response_matrix
    description: Full drug-response matrix containing both training and held-out IC50 labels.
    kind: raw
    grantable: false
    reason: Held-out outcomes are evaluator-only and must not be exposed during model development.
    source_paths:
      - figshare/31268542/Creammist_common_ic50.csv

  - id: heldout_drug_response_labels
    description: Evaluator-only IC50 labels for the fixed held-out drug and cell-line rows.
    kind: processed
    grantable: false
    reason: These labels are used only by deterministic judge-side metric recomputation.
    source_base: problem
    source_paths:
      - evaluator/drug_response_test_labels.csv

  - id: author_repo_archive
    description: Deposited code archive for this study.
    kind: processed
    grantable: false
    reason: The archive is the authors' method implementation and is the solution.
    source_paths:
      - zenodo/19491795/**/*.zip

  - id: trained_models
    description: Trained model checkpoints.
    kind: processed
    grantable: false
    reason: Trained author models encode the solution directly.
    source_paths:
      - figshare/31268542/*.hdf5
      - figshare/31268542/*FORGE.pkl

  - id: model_results
    description: Precomputed analysis outputs.
    kind: processed
    grantable: false
    reason: Gene-importance scores, key DEG clusters, Steiner networks, and result
      tables are the study's findings.
    source_paths:
      - figshare/31268542/*geneImp.csv
      - figshare/31268542/*keyCluster_deg.csv
      - figshare/31268542/*steinerTree.graphml
      - figshare/31268542/*_results.csv
      - figshare/31268542/Tahoe100M_DEG_list

  - id: record_metadata
    description: Repository record metadata.
    kind: processed
    grantable: false
    reason: Record metadata exposes the paper title, authors, and DOI.
    source_paths:
      - figshare/31268542/metadata.json
      - zenodo/19491795/metadata.json
