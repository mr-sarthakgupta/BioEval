services:
  experiment-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.experiment-agent
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      OPENALEX_API_KEY_FILE: /run/secrets/openalex_key
      EXPERIMENT_AGENT_MODEL: ${EXPERIMENT_AGENT_MODEL:-us.anthropic.claude-sonnet-4-6}
      EXPERIMENT_AGENT_API_BASE: ${EXPERIMENT_AGENT_API_BASE:-bedrock:us-east-1}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_PROFILE: ${AWS_PROFILE:-default}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BEDROCK_AWS_REGION: ${BEDROCK_AWS_REGION:-us-east-1}
      BEDROCK_PROMPT_CACHE_TTL: ${BEDROCK_PROMPT_CACHE_TTL:-1h}
      BIOEVAL_PROBLEM_ID: ${BIOEVAL_PROBLEM_ID}
      BIOEVAL_ALLOW_CONDITIONAL: ${BIOEVAL_ALLOW_CONDITIONAL:-0}
      BIOEVAL_RUN_ID: ${BIOEVAL_RUN_ID:-default}
      BIOEVAL_LOG_DIR: /run/logs
      BIOEVAL_MAX_DATASET_GRANTS_PER_REQUEST: ${BIOEVAL_MAX_DATASET_GRANTS_PER_REQUEST:-1}
      BIOEVAL_TRAFFIC_GUARD_ENABLED: ${BIOEVAL_TRAFFIC_GUARD_ENABLED:-1}
      BIOEVAL_TRAFFIC_GUARD_FAIL_CLOSED: ${BIOEVAL_TRAFFIC_GUARD_FAIL_CLOSED:-1}
      BIOEVAL_TRAFFIC_GUARD_MODEL: ${BIOEVAL_TRAFFIC_GUARD_MODEL:-us.anthropic.claude-sonnet-4-6}
      BIOEVAL_TRAFFIC_GUARD_API_BASE: ${BIOEVAL_TRAFFIC_GUARD_API_BASE:-bedrock:us-east-1}
      BIOEVAL_OPENALEX_DESCENDANT_DEPTH: ${BIOEVAL_OPENALEX_DESCENDANT_DEPTH:-20}
      BIOEVAL_OPENALEX_DESCENDANT_MAX_NODES: ${BIOEVAL_OPENALEX_DESCENDANT_MAX_NODES:-10000}
      BIOEVAL_OPENALEX_GRAPH_CACHE_TTL: ${BIOEVAL_OPENALEX_GRAPH_CACHE_TTL:-21600}
    command:
      - --problems-root=/problems
      - --staging-root=/run/data_grants
      - --sandbox-data-root=/workspace/data
      - --problem-id=${BIOEVAL_PROBLEM_ID}
      - --run-id=${BIOEVAL_RUN_ID:-default}
      - --run-root=/run
      - --host=0.0.0.0
      - --port=8765
    volumes:
      # Mount only catalog-approved source roots for the selected problem. Hidden
      # evaluator labels, papers, and author repositories never enter this container.
      - ../../${BIOEVAL_PROBLEMS_DIR:?set BIOEVAL_PROBLEMS_DIR}/${BIOEVAL_PROBLEM_ID}/data:/problems/${BIOEVAL_PROBLEM_ID}/data:ro
      - ../../${BIOEVAL_PROBLEMS_DIR:?set BIOEVAL_PROBLEMS_DIR}/${BIOEVAL_PROBLEM_ID}/curated:/problems/${BIOEVAL_PROBLEM_ID}/curated:ro
      - ../../${BIOEVAL_PROBLEMS_DIR:?set BIOEVAL_PROBLEMS_DIR}/${BIOEVAL_PROBLEM_ID}/data_catalog.yaml:/problems/${BIOEVAL_PROBLEM_ID}/data_catalog.yaml:ro
      - ../runs/${BIOEVAL_PROBLEM_ID}/${BIOEVAL_RUN_ID:-default}:/run
      - ${OPENALEX_API_KEY_FILE:-/home/mrsar/openalex_key.txt}:/run/secrets/openalex_key:ro
      - ${HOME}/.aws:/root/.aws:ro
    ports:
      - "8765:8765"

  uea:
    build:
      context: ..
      dockerfile: docker/Dockerfile.uea
    depends_on:
      - experiment-agent
    environment:
      EXPERIMENT_AGENT_URL: http://experiment-agent:8765/experiments
      BIOEVAL_DISK_BUDGET_GB: ${BIOEVAL_DISK_BUDGET_GB:-20}
      OPENAI_API_KEY: ${UEA_OPENAI_API_KEY:-}
      UEA_BEDROCK_MODEL: ${UEA_BEDROCK_MODEL:-us.anthropic.claude-sonnet-4-6}
      UEA_BEDROCK_API_BASE: ${UEA_BEDROCK_API_BASE:-bedrock:us-east-1}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_PROFILE: ${AWS_PROFILE:-default}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BEDROCK_AWS_REGION: ${BEDROCK_AWS_REGION:-us-east-1}
      BEDROCK_PROMPT_CACHE_TTL: ${BEDROCK_PROMPT_CACHE_TTL:-1h}
      BIOEVAL_RUN_ID: ${BIOEVAL_RUN_ID:-default}
      BIOEVAL_LOG_DIR: /logs
      BIOEVAL_TOOL_LOG: /submit/tool_calls.jsonl
      BIOEVAL_SHELL_COMMAND_LOG: /submit/shell_commands.jsonl
      BIOEVAL_TERMINAL_LOG: /submit/terminal.typescript
    # Real, broadly-supported resource limits.
    mem_limit: ${BIOEVAL_MEM_LIMIT:-8g}
    memswap_limit: ${BIOEVAL_MEM_LIMIT:-8g}
    pids_limit: 512
    cpus: ${BIOEVAL_CPUS:-4}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=256m
    # Disk usage is enforced cooperatively by `check_space`; Docker writable-layer
    # quotas are not portable across WSL/storage-driver configurations.
    volumes:
      - ../runs/${BIOEVAL_PROBLEM_ID}/${BIOEVAL_RUN_ID:-default}/uea_workspace:/workspace
      - ../runs/${BIOEVAL_PROBLEM_ID}/${BIOEVAL_RUN_ID:-default}/data_grants:/workspace/data:ro
      - ../runs/${BIOEVAL_PROBLEM_ID}/${BIOEVAL_RUN_ID:-default}/results:/submit
      - ../runs/${BIOEVAL_PROBLEM_ID}/${BIOEVAL_RUN_ID:-default}/logs:/logs
      - ${HOME}/.aws:/root/.aws:ro
    working_dir: /workspace
    # Optional egress guardrail (opt-in). Blackhole the hosts that serve the original
    # paper/repository so the UEA cannot pull the solution directly. Leave commented
    # if you want the UEA to fetch arbitrary public data itself.
    # extra_hosts:
    #   - "github.com:0.0.0.0"
    #   - "raw.githubusercontent.com:0.0.0.0"
    #   - "codeload.github.com:0.0.0.0"
    #   - "www.nature.com:0.0.0.0"
    #   - "doi.org:0.0.0.0"
    command: ["/bin/bash", "-lc", "check_space; sleep infinity"]
