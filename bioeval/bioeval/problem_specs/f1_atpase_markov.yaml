problem_id: s41467-026-73844-0_f1-atpase-markov-model
benchmark_status: active
title: F1-ATPase kinetic and nucleotide-binding observation audit
doi: 10.1038/s41467-026-73844-0
target_footprint_date: 2026-03-20
external_source_cutoff: 2026-03-19T23:59:59Z
sandbox_prompt: |
  Audit the frozen F1-ATPase turnover, chemo-mechanical coupling, and ATP-, ADP-,
  and mixed-nucleotide binding observations. For each of the five datasets, report
  its observation count, concentration range, observed-value range, and Spearman
  association between nucleotide concentration and the measured value.

  Submit `f1_observation_summary.csv` using the declared schema. The evaluator
  independently recomputes every value from the supplied observations. Discuss
  saturation, occupancy, and the limits of the sparse calibration bundle. Do not
  infer a minimum number of conformations or claim validation of a Markov mechanism;
  those conclusions require a forward model that is outside this bounded task.
expected_conclusions:
  - Turnover increases strongly with ATP concentration over the supplied range and approaches saturation.
  - The supplied coupling-efficiency observations remain near unity across the ATP grid.
  - ATP, ADP, and mixed-nucleotide titrations show concentration-dependent site occupancy approaching the three-site scale.
  - These observations constrain calibration behavior but do not independently establish a minimum Markov-state or conformation count.
judge_rubric:
  - Does the artifact exactly reproduce counts, ranges, and rank associations for all five datasets?
  - Does the answer distinguish turnover, coupling, and the three titration conditions?
  - Are saturation and occupancy statements supported by supplied observations?
  - Does the answer avoid unsupported Markov-state, conformation-count, and mechanism claims?
required_artifacts:
  - path: f1_observation_summary.csv
    columns: [dataset, observation_count, min_concentration_molar, max_concentration_molar, min_observed_value, max_observed_value, spearman_concentration_value]
    min_rows: 5
expected_caveats:
  - The four-conformation minimum depends on the declared model family, candidate-generation and pruning rules, thresholds, and available constraints.
  - Several rate constants are inferred indirectly rather than measured directly.
  - The paper's source-data archive is dominated by fitted parameters and model predictions; those outputs cannot be used as experimental validation evidence.
