problem_id: s41467-026-73635-7_butterfly-longevity-pollen-feeding
title: Heliconiini butterfly longevity and pollen feeding
doi: 10.1038/s41467-026-73635-7
sandbox_prompt: |
  Some closely related neotropical butterflies appear to differ substantially in adult
  lifespan and ageing rate, but the size and cause of these differences are debated.
  Using public literature and data you obtain through the data-agent, characterize how
  survival and age-associated physiology vary across the sampled species, then infer
  which ecological, dietary, or lineage-level explanations are best supported.
  Distinguish direct environmental effects from evolved differences where the data
  allow it, and state the limits of the comparison.
expected_conclusions:
  - Pollen-feeding Heliconius species show substantially longer maximum and median lifespans than non-pollen-feeding Heliconiini outgroups.
  - The data support roughly a three-fold lifespan extension in Heliconius, with some maximum records approaching one year.
  - Pollen feeding provides direct benefits to Heliconius, including longer survival or improved physiological condition in diet experiments.
  - Pollen does not fully explain the lifespan extension because pollen-deprived Heliconius still outlive the non-pollen-feeding comparison species.
  - Heliconius show evidence of slowed actuarial and physiological ageing, including reduced mortality-age increase and maintained grip strength.
expected_caveats:
  - Maximum lifespan records are observational and sample-size sensitive.
  - The transition to pollen feeding occurred once, limiting strong causal phylogenetic inference.
judge_rubric:
  - Does the answer compare Heliconius with non-pollen-feeding Heliconiini rather than generic butterflies?
  - Does it separate dietary plastic effects from evolved/heritable longevity?
  - Does it use survival/ageing metrics beyond maximum lifespan?
  - Does it acknowledge observational and phylogenetic limitations?
